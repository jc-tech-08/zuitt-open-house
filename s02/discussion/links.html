<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,
		intial-scale=1">

		<title>HTML - Hyperlinks</title>
	</head>
	<body>
		<h1>HTML Hyperlinks</h1>

		<p>HTML Hyperlinks are created using the anchor tag.</p>

		<h3>There are two kinds of links:</h3>

		<!-- ul tag (unordered list) is use to create a bulleted list in your webpage -->
		<ul>
			<li>Absolute Link</li>
			<li>Relative Link</li>
		</ul>

		<div>
			<!-- Absolute links are links to page n other websites. It used together wjth the href to define the locaiton or address of the link to be redirected -->
			<h4 id = "top">Absolute Links</h4>
			<a href="https://zuitt.co/" target="_blank">Zuitt Coding Bootcamp</a>
			<a href="https://www.linkedin.com/login">Linkedin</a>
		</div>

		<div>
			<h4>Relative Links</h4>
			<a href="./attributes.html">Attributes Page</a>
			<a href="./links.html">Links Page</a>
			<a href="./index.html">Home Page</a>
		</div>

		<!-- Short demonstration for adding image -->

		<div>
			<br>
			<img src="./picture1.png">
			<br>
			<img src="./picture2.png">
			<br>
			<img src="./picture3.png">
		</div>

		<!-- Relative linking within the same page -->

		<div>
			<a href="#top">Return to top</a>
		</div>
	</body>
</html>
