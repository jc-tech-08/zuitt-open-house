<!-- DOCTYPE html -tells our browser that the file type is html. -->
<!DOCTYPE html>
<!-- html tells our browser to read the contents of the file as HTML -->
<html>
	<!-- head tag = contains the details of the HTML file not visible in the browser. -->
	<!-- head tag usually contains configuratins or details about the web page.  -->
	<head>
		<!-- meta tags = they are used to set or add details about our webpage. -->
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,
		intial-scale=1">

		<!-- title tag sets the title of the tab show in the browser. -->
		<title>HTML - Introduction</title>
	</head>

	<!-- body tag contains the actual content of the html file that are visible to the browser. This is where the elements that you want to be showed in webpage should be added. -->
	<body>
		<!-- Creates heading elements -->
		<!-- Heading elements has 6 tyoes: h1, h2, h3, h4, h5, h6, h1 is the biggest and h6 is the smallest in terms of the font size. -->
		<h1> Zuitt Coding Bootcamp</h1>
		<!-- <h2> Zuitt Coding Bootcamp</h2>
		<h3> Zuitt Coding Bootcamp</h3>
		<h4> Zuitt Coding Bootcamp</h4>
		<h5> Zuitt Coding Bootcamp</h5>
		<h6> Zuitt Coding Bootcamp</h6> -->

		<h2>John Doe</h2>

		<!-- p(paragraph tag) - this is use to create paragraph elements in our page. -->
		<!-- br tag is used to add break elements in our webpage. -->
		<p>Welcome to Zuitt! <br/> Let's enumerate all the things that we will be studying in this Zuitt Open House.</p>

		<h3>Zuitt open House</h3>

		<!-- ol (ordered list) this is use to create an ordered list-->
		<ol>
			<!-- li (list item) is used to add list item in the list -->
			<li>Git Basics</li>
			<li>HTML - Introductions</li>
			<li>CSS - Introduction</li>
			<li>CSS - Common Styling</li>
		</ol>

		<div>
			<h4>Relative Links</h4>
			<a href="./attributes.html">Attributes Page</a>
			<a href="./links.html">Links Page</a>
			<a href="./index.html">Home Page</a>
		</div>
	</body>
</html>
